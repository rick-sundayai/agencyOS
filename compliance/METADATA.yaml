# Governance
governance:
  repository: "rick-sundayai/agencyOS"
  repository_path: "/compliance"
  version_control: "Git (with commit history)"
  approval_required: true
  approval_roles:
    - "System Administrator"
    - "Infrastructure Architect"
    - "Legal (for data policies)"
  distribution:
    internal: "GitHub (all operators)"
    external: "Upon request to specific clients"
  access_control: "Public (internal repo) or Client-specific (external)"

