# Notes
notes: |
  - All dates are in YYYY-MM-DD format (UTC)
  - Review frequency is measured from last_updated, not next_review
  - Changes requiring approval must be documented in CHANGELOG.md
  - Policy violations should be escalated immediately
  - Operational procedures are in 03-operations/runbooks/ for easy reference
